<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Elite Members</title>
  <meta name="theme-color" content="#0a0a1a" />
  <link rel="manifest" href="../manifest.json" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a1a;
      --surface: #111127;
      --surface2: #1a1a35;
      --border: rgba(255,255,255,0.08);
      --text: #f0f0ff;
      --muted: #8888aa;
      --gold: #f5c842;
      --gold2: #e8a020;
      --blue: #4a6fff;
      --purple: #8b5cf6;
      --green: #10b981;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background */
    .bg-orbs {
      position: fixed; inset: 0; z-index: 0; overflow: hidden;
    }
    .orb {
      position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.25;
      animation: float 8s ease-in-out infinite;
    }
    .orb1 { width: 400px; height: 400px; background: var(--purple); top: -100px; left: -100px; animation-delay: 0s; }
    .orb2 { width: 300px; height: 300px; background: var(--gold); bottom: -80px; right: -80px; animation-delay: 3s; }
    .orb3 { width: 250px; height: 250px; background: var(--blue); top: 40%; left: 60%; animation-delay: 1.5s; }
    @keyframes float {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    .login-card {
      position: relative; z-index: 1;
      background: rgba(17,17,39,0.85);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      border-radius: 28px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      margin: 20px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
      animation: slideUp 0.6s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-wrap {
      text-align: center; margin-bottom: 32px;
    }
    .logo-wrap img { width: 60px; margin-bottom: 14px; }
    .logo-wrap h1 {
      font-size: 26px; font-weight: 900; letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--gold), var(--gold2), #ff8c42);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .logo-wrap p { color: var(--muted); font-size: 14px; margin-top: 6px; line-height: 1.5; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      color: var(--muted); font-size: 12px; margin: 24px 0;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* Google Button */
    .google-btn {
      width: 100%; padding: 15px 20px;
      background: #fff; color: #1f1f1f;
      border: none; border-radius: 14px;
      font-size: 15px; font-weight: 700;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center; gap: 12px;
      transition: all 0.2s; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      font-family: 'Inter', sans-serif;
    }
    .google-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.4); }
    .google-btn:active { transform: translateY(0); }
    .google-btn svg { width: 20px; height: 20px; }

    /* Email form */
    .form-group { margin-bottom: 16px; }
    .form-group label { font-size: 12px; font-weight: 600; color: var(--muted); display: block; margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase; }
    .form-group input {
      width: 100%; padding: 14px 16px;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid var(--border);
      border-radius: 12px; color: var(--text);
      font-size: 14px; font-family: 'Inter', sans-serif;
      outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: var(--purple); }
    .form-group input::placeholder { color: var(--muted); }

    .submit-btn {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      color: #fff; border: none; border-radius: 14px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s; box-shadow: 0 4px 20px rgba(139,92,246,0.4);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(139,92,246,0.5); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .toggle-mode {
      text-align: center; margin-top: 18px; font-size: 13px; color: var(--muted);
    }
    .toggle-mode a { color: var(--gold); font-weight: 600; cursor: pointer; text-decoration: none; }

    .msg-box {
      padding: 12px 14px; border-radius: 10px; font-size: 13px; margin-bottom: 16px;
      display: none;
    }
    .msg-box.error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #f87171; }
    .msg-box.success { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); color: #34d399; }

    .spinner {
      width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .terms { text-align: center; font-size: 11px; color: var(--muted); margin-top: 20px; line-height: 1.6; }
    .terms a { color: var(--gold); text-decoration: none; }

    .tabs { display: flex; background: rgba(255,255,255,0.04); border-radius: 12px; padding: 4px; margin-bottom: 24px; }
    .tab {
      flex: 1; padding: 10px; text-align: center; border-radius: 9px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      color: var(--muted); transition: all 0.2s;
    }
    .tab.active { background: var(--surface2); color: var(--text); }
  </style>
</head>
<body>

  <div class="bg-orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <div class="login-card">
    <div class="logo-wrap">
      <img src="https://img.icons8.com/color/96/crown.png" alt="Elite Members" />
      <h1>Elite Members</h1>
      <p>Africa's #1 Community for Creators,<br>Traders & Entrepreneurs</p>
    </div>

    <!-- Google Sign In -->
    <button class="google-btn" onclick="signInWithGoogle()">
      <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
      Continue with Google
    </button>

    <div class="divider">or use email</div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</div>
      <div class="tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</div>
    </div>

    <!-- Message Box -->
    <div class="msg-box" id="msgBox"></div>

    <!-- Sign In Form -->
    <div id="signin-form">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="si-email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="si-password" placeholder="••••••••" />
      </div>
      <button class="submit-btn" onclick="signIn()">
        <span id="si-text">Sign In</span>
        <div class="spinner" id="si-spinner"></div>
      </button>
      <div class="toggle-mode">
        Forgot password? <a onclick="resetPassword()">Reset it</a>
      </div>
    </div>

    <!-- Sign Up Form -->
    <div id="signup-form" style="display:none">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="su-name" placeholder="Your full name" />
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="su-email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="su-password" placeholder="Min 8 characters" />
      </div>
      <button class="submit-btn" onclick="signUp()">
        <span id="su-text">Create Account</span>
        <div class="spinner" id="su-spinner"></div>
      </button>
    </div>

    <div class="terms">
      By continuing, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
    </div>
  </div>

  <script>
    // Supabase init
    const SUPABASE_URL = 'https://eiyexnuhqdscomilwpqg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVpeWV4bnVocWRzY29taWx3cHFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDY1MzI4NTcsImV4cCI6MjA2MjEwODg1N30.tQCwDfOWB-sMTPCVKxUhMvXNpkQ60m3iEz39DP_VUC4';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Check if already logged in
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) {
        window.location.href = '../pages/feed.html';
      }
    });

    // Listen for auth changes (OAuth callback)
    sb.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN' && session) {
        window.location.href = '../pages/feed.html';
      }
    });

    function switchTab(tab) {
      document.getElementById('tab-signin').classList.toggle('active', tab === 'signin');
      document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
      document.getElementById('signin-form').style.display = tab === 'signin' ? 'block' : 'none';
      document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
      showMsg('', '');
    }

    function showMsg(text, type) {
      const box = document.getElementById('msgBox');
      box.textContent = text;
      box.className = 'msg-box ' + type;
      box.style.display = text ? 'block' : 'none';
    }

    function setLoading(prefix, loading) {
      document.getElementById(prefix + '-text').style.display = loading ? 'none' : 'inline';
      document.getElementById(prefix + '-spinner').style.display = loading ? 'block' : 'none';
      document.querySelector('#' + prefix + '-form .submit-btn').disabled = loading;
    }

    async function signInWithGoogle() {
      const { error } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: window.location.origin + '/pages/feed.html'
        }
      });
      if (error) showMsg(error.message, 'error');
    }

    async function signIn() {
      const email = document.getElementById('si-email').value.trim();
      const password = document.getElementById('si-password').value;
      if (!email || !password) return showMsg('Please fill in all fields.', 'error');
      setLoading('si', true);
      const { error } = await sb.auth.signInWithPassword({ email, password });
      setLoading('si', false);
      if (error) showMsg(error.message, 'error');
      else window.location.href = '../pages/feed.html';
    }

    async function signUp() {
      const name = document.getElementById('su-name').value.trim();
      const email = document.getElementById('su-email').value.trim();
      const password = document.getElementById('su-password').value;
      if (!name || !email || !password) return showMsg('Please fill in all fields.', 'error');
      if (password.length < 8) return showMsg('Password must be at least 8 characters.', 'error');
      setLoading('su', true);
      const { error } = await sb.auth.signUp({
        email, password,
        options: { data: { full_name: name } }
      });
      setLoading('su', false);
      if (error) showMsg(error.message, 'error');
      else showMsg('✅ Account created! Check your email to verify.', 'success');
    }

    async function resetPassword() {
      const email = document.getElementById('si-email').value.trim();
      if (!email) return showMsg('Enter your email above first.', 'error');
      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/pages/login.html'
      });
      if (error) showMsg(error.message, 'error');
      else showMsg('✅ Password reset email sent!', 'success');
    }
  </script>
</body>
</html>
